# ============================================================
# nginx.conf — Nginx Reverse Proxy for HNG Nextcloud
#
# Role of Nginx here:
#   • Sit in front of Nextcloud and receive ALL incoming HTTP traffic
#   • Forward requests to Nextcloud container (reverse proxy)
#   • Write every request as a JSON log line to a shared volume
#   • Trust and forward the real client IP via X-Forwarded-For
#
# Traffic flow:
#   Client → Nginx (:80) → Nextcloud (:80 internal) → response back
# ============================================================


# ── Worker processes ──────────────────────────────────────────
# "auto" tells Nginx to spawn one worker per CPU core.
# More workers = more requests handled in parallel.
worker_processes auto;


# ── Error log ─────────────────────────────────────────────────
# Where Nginx writes its own internal errors (NOT access logs).
# "warn" level means only warnings and above are logged.
# Change to "debug" temporarily if Nginx won't start.
error_log /var/log/nginx/error.log warn;


# ── PID file ──────────────────────────────────────────────────
# Nginx writes its process ID here. Used by init systems to
# send signals (reload, stop) to the master process.
pid /var/run/nginx.pid;


# ── Events block ──────────────────────────────────────────────
# Controls how Nginx handles connections at the OS level.
events {

    # Maximum simultaneous connections PER worker process.
    # Total connections = worker_processes × worker_connections.
    # 1024 is a safe default for a 2 vCPU server.
    worker_connections 1024;

    # "epoll" is the most efficient I/O event model on Linux.
    # It scales well to thousands of concurrent connections.
    use epoll;

    # Allow each worker to accept multiple connections at once
    # instead of one at a time. Better throughput under load.
    multi_accept on;

}


# ── HTTP block ────────────────────────────────────────────────
# All web server configuration lives inside here.
http {

    # ── MIME types ────────────────────────────────────────────
    # Maps file extensions to Content-Type headers.
    # "include" pulls in the default MIME type map that ships with Nginx.
    include      /etc/nginx/mime.types;

    # Fallback MIME type if the extension isn't in the map.
    default_type application/octet-stream;


    # ── Real IP configuration ─────────────────────────────────
    # CRITICAL for your detector to see real client IPs.
    #
    # Problem: When traffic passes through AWS load balancers or
    # other proxies, Nginx sees the proxy's IP, not the client's IP.
    # Solution: Read the real IP from the X-Forwarded-For header.
    #
    # set_real_ip_from: trust X-Forwarded-For headers from these ranges.
    # These are private/internal IP ranges used by AWS infrastructure.
    # ONLY trust headers from networks you control — otherwise an attacker
    # could spoof their IP by sending a fake X-Forwarded-For header.

    # AWS internal network ranges (VPC private IPs)
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;

    # AWS ALB / CloudFront IP ranges (if you use them in front of Nginx)
    # Add more ranges here if you add a CDN or load balancer later.
    set_real_ip_from 127.0.0.1;

    # Which header contains the real IP.
    # X-Forwarded-For is the standard header set by proxies/load balancers.
    # "proxy_protocol" is the alternative if you use PROXY protocol.
    real_ip_header X-Forwarded-For;

    # If X-Forwarded-For contains a chain of IPs (client, proxy1, proxy2),
    # "recursive" makes Nginx peel back through trusted IPs to find
    # the first untrusted (real client) IP.
    real_ip_recursive on;


    # ── JSON access log format ────────────────────────────────
    # This is the most important part for your detector.
    # Every HTTP request generates one JSON line in this format.
    #
    # $remote_addr    = the real client IP (after real_ip processing above)
    # $time_iso8601   = ISO 8601 timestamp e.g. 2025-04-25T14:32:01+00:00
    # $request_method = GET, POST, DELETE, etc.
    # $request_uri    = full path including query string e.g. /index.php?foo=bar
    # $status         = HTTP response code: 200, 404, 500, etc.
    # $body_bytes_sent= response body size in bytes (excludes headers)
    # $http_user_agent= browser/client identifier
    # $http_referer   = page that linked to this request (if any)
    # $request_time   = how long Nginx took to respond (seconds, 3 decimal places)
    # $upstream_addr  = which backend server handled the request

    log_format hng_json escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"user_agent":"$http_user_agent",'
            '"referer":"$http_referer",'
            '"request_time":$request_time,'
            '"upstream":"$upstream_addr",'
            '"host":"$host"'
        '}';


    # ── Access log destination ────────────────────────────────
    # Write access logs to this path using the JSON format defined above.
    # This path is INSIDE the Nginx container.
    # The Docker volume "HNG-nginx-logs" maps this path so other
    # containers (Nextcloud, detector) can read the same file.
    #
    # "buffer=16k" — buffer 16KB before flushing to disk.
    #                Reduces I/O syscalls under high traffic.
    # "flush=1s"   — force-flush to disk every 1 second at minimum.
    #                Ensures the detector sees new lines within 1 second.
    access_log /var/log/nginx/hng-access.log hng_json buffer=16k flush=1s;


    # ── Performance settings ──────────────────────────────────

    # sendfile: use kernel-level file transfer instead of copying through
    # user space. Faster for serving static files.
    sendfile on;

    # tcp_nopush: send HTTP response headers and beginning of file in one
    # packet. Reduces latency on the first response.
    tcp_nopush on;

    # tcp_nodelay: disable Nagle's algorithm for keep-alive connections.
    # Sends small packets immediately rather than buffering them.
    tcp_nodelay on;

    # keepalive_timeout: how long to keep an idle connection open.
    # 65 seconds is a standard value. Reduces overhead of repeated TCP handshakes.
    keepalive_timeout 65;


    # ── Gzip compression ──────────────────────────────────────
    # Compress responses before sending them to the client.
    # Reduces bandwidth usage and speeds up page loads.
    gzip on;
    gzip_vary on;           # tell caches that the response varies by Accept-Encoding
    gzip_min_length 1024;   # don't compress responses smaller than 1KB (not worth it)
    gzip_types                # compress these content types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;


    # ── Upload size ───────────────────────────────────────────
    # Nextcloud is a file storage platform — users upload large files.
    # Default Nginx limit is 1MB which would break file uploads.
    # Set to 10GB to allow large file uploads through the proxy.
    # Nextcloud itself also has a PHP upload limit — they must both be raised.
    client_max_body_size 10G;

    # Increase buffer sizes for large file uploads
    client_body_buffer_size    128k;
    client_header_buffer_size  1k;
    large_client_header_buffers 4 16k;


    # ── Timeouts ──────────────────────────────────────────────
    # How long to wait for the upstream (Nextcloud) to respond.
    # Large file uploads can take minutes — set these generously.
    proxy_connect_timeout  60s;    # time to establish connection to Nextcloud
    proxy_send_timeout    300s;    # time for Nginx to send a request to Nextcloud
    proxy_read_timeout    300s;    # time to wait for Nextcloud's response


    # ── Security headers ──────────────────────────────────────
    # Add HTTP security headers to every response.
    # These protect users from common browser-level attacks.

    # Prevent browsers from MIME-sniffing the content type
    add_header X-Content-Type-Options nosniff always;

    # Prevent this page from being embedded in an iframe (clickjacking protection)
    add_header X-Frame-Options SAMEORIGIN always;

    # Enable browser's built-in XSS filter
    add_header X-XSS-Protection "1; mode=block" always;

    # Hide Nginx version from error pages and Server header
    # Attackers can use version info to find known vulnerabilities
    server_tokens off;


    # ── Main server block ─────────────────────────────────────
    # Defines how Nginx handles incoming HTTP requests on port 80.
    server {

        # Listen on port 80 for IPv4 connections
        listen 80;

        # Listen on port 80 for IPv6 connections
        # "default_server" makes this the catch-all if no other server block matches
        listen [::]:80 default_server;

        # server_name: which domain names this block responds to.
        # "_" is a wildcard — matches ANY hostname including bare IP access.
        # Replace with your actual domain if you set one up for Nextcloud.
        # Example: server_name nextcloud.yourdomain.com;
        server_name _;

        # ── Nextcloud-specific headers ────────────────────────
        # These headers are required by Nextcloud to function correctly
        # behind a reverse proxy.

        # Tell Nextcloud its public URL so it generates correct links
        # $scheme = "http" or "https"
        # $host   = the domain name from the request
        proxy_set_header Host $host;

        # Pass the real client IP to Nextcloud's application layer
        # Without this, Nextcloud thinks all traffic comes from Nginx's IP
        proxy_set_header X-Real-IP $remote_addr;

        # Standard header for forwarded client IP (chain of proxies)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Tell Nextcloud whether the original request was HTTP or HTTPS
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required by Nextcloud: passes the original host header
        proxy_set_header X-Forwarded-Host $host;

        # Prevent Nginx from rewriting Location headers in responses
        # Nextcloud sends redirects — we don't want Nginx to break them
        proxy_redirect off;

        # Use HTTP/1.1 to talk to the upstream (Nextcloud container)
        # Required for WebSockets and keep-alive connections
        proxy_http_version 1.1;

        # Clear the Connection header so Nginx manages keep-alives itself
        proxy_set_header Connection "";


        # ── Main proxy location ───────────────────────────────
        # "/" matches ALL requests — everything gets forwarded to Nextcloud.
        location / {

            # Forward requests to the Nextcloud container.
            # "nextcloud" is the Docker Compose service name —
            # Docker's internal DNS resolves it to the container's IP.
            # Port 80 is what Nextcloud listens on inside its container.
            proxy_pass http://nextcloud:80;

            # Buffer the proxy response in Nginx memory before sending to client.
            # Prevents slow clients from tying up Nextcloud connections.
            proxy_buffering on;

            # Size of each buffer for reading upstream response
            proxy_buffer_size        4k;
            proxy_buffers            8 4k;
            proxy_busy_buffers_size  8k;
        }


        # ── WebDAV / CalDAV / CardDAV support ─────────────────
        # Nextcloud uses WebDAV for file syncing clients.
        # These paths need special handling for DAV methods.
        location /.well-known/carddav {
            # Redirect CardDAV requests to Nextcloud's DAV endpoint
            return 301 $scheme://$host/remote.php/dav;
        }
        location /.well-known/caldav {
            # Redirect CalDAV requests to Nextcloud's DAV endpoint
            return 301 $scheme://$host/remote.php/dav;
        }


        # ── Health check endpoint ─────────────────────────────
        # Returns "healthy" for load balancer / uptime monitor pings.
        # Does NOT proxy to Nextcloud — Nginx answers directly.
        # This endpoint is NOT logged (reduces log noise).
        location /nginx-health {
            access_log off;           # don't log health check hits
            add_header Content-Type text/plain;
            return 200 "healthy\n";
        }


        # ── Static asset caching ──────────────────────────────
        # Tell browsers to cache Nextcloud's static files aggressively.
        # Reduces repeat requests for CSS, JS, images.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://nextcloud:80;

            # Cache for 30 days in the browser
            expires 30d;
            add_header Cache-Control "public, immutable";

            # Still log these but they won't trigger anomaly detection
            # because static assets are expected to have high rates
        }


        # ── Block common attack paths ─────────────────────────
        # Reject requests to paths that are never legitimate.
        # Return 444 — Nginx closes the connection without sending any response.
        # This is more efficient than 403 because no response bytes are sent.
        location ~* \.(php7|phtml|asp|aspx|jsp)$ {
            # Block attempts to execute server-side scripts directly
            deny all;
            return 444;
        }

        # Block access to hidden files (e.g. .git, .env, .htaccess)
        location ~ /\. {
            deny all;
            return 444;
            access_log off;    # don't log these — would be very noisy
        }


        # ── Error pages ───────────────────────────────────────
        # Custom error responses. Nextcloud handles its own errors,
        # but if Nginx itself errors (e.g. upstream is down), show these.
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            add_header Content-Type text/html;
            return 502 '<html><body><h2>Service temporarily unavailable</h2></body></html>';
        }

    }
    # End of server block

}
# End of http block